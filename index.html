<!DOCTYPE html>
<html>
<head>
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Job Application Tracker</h1>

<form id="jobForm">
    <input type="text" id="company" placeholder="Company Name" required>
    <input type="text" id="role" placeholder="Job Role" required>

    <select id="status">
        <option>Applied</option>
        <option>Interview</option>
        <option>Rejected</option>
        <option>Offer</option>
    </select>

    <button type="submit">Add Job</button>
</form>

<!-- FILTER & SORT -->
<div class="controls">
    <select id="filterStatus" onchange="filterJobs()">
        <option value="all">All</option>
        <option value="Applied">Applied</option>
        <option value="Interview">Interview</option>
        <option value="Rejected">Rejected</option>
        <option value="Offer">Offer</option>
    </select>

    <select onchange="sortJobs(this.value)">
        <option value="">Sort</option>
        <option value="az">Company A-Z</option>
        <option value="za">Company Z-A</option>
    </select>
</div>

<table>
<thead>
<tr>
    <th>S.No</th>
    <th>Company</th>
    <th>Role</th>
    <th>Status</th>
    <th>Date Applied</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="jobList"></tbody>
</table>

</div>

<script src="script.js"></script>
</body>
</html>
